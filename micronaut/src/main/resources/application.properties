#Wed Apr 08 15:26:05 UTC 2026

micronaut.application.name=aluguelcarros

# Servir arquivos estaticos em src/main/resources/static
micronaut.router.static-resources.default.enabled=true
micronaut.router.static-resources.default.mapping=/**
micronaut.router.static-resources.default.paths=classpath:static

# H2 em arquivo local (persistente entre reinicios)
datasources.default.db-type=h2
datasources.default.dialect=H2
datasources.default.driver-class-name=org.h2.Driver
datasources.default.url=jdbc:h2:file:./data/aluguelcarros_micronaut;DB_CLOSE_DELAY=-1
datasources.default.username=sa
datasources.default.password=

# JPA / Hibernate
jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.properties.hibernate.show_sql=true
jpa.default.properties.hibernate.format_sql=true

# Console web do H2 (Micronaut nao expoe /h2-console como Spring Boot)
h2.console.enabled=true
h2.console.port=8082
