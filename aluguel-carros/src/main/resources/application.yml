micronaut:
  application:
    name: aluguelcarros

datasources:
  default:
    url: jdbc:h2:mem:devDb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: ""

jpa:
  default:
    entity-scan:
      packages:
        - com.aluguelcarros.model
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: true